<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            width: 100%;
        }
        img:hover{
            filter: brightness(150%);
            filter: saturate(150%);
            filter: contrast(150%);
            filter: hue-rotate(160deg);
            filter: grayscale();
            filter: opacity(0.5);
            filter: drop-shadow(10px 10px 10px black);
            filter: sepia(200%);
            filter: blur(10px);
            filter: invert();
        }
    </style>
</head>
<body>
    <img src="https://miro.medium.com/1*osIwA7IVeh-oVIFKMyJOHA.jpeg" alt="">
</body>
</html>
