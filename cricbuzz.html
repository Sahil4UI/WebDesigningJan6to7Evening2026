<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* default settings */
        * {
            box-sizing: border-box;
            /* it will adjust width height according to margin padding
            automatically */
        }

        body {
            margin: 0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            margin-top: 0;
        }

        a {
            text-decoration: none;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        /* header section */
        header{
            background-color: #30936F;
            display: flex;
            /* isse logo aur nav eksath ayenge */
        }
        .container{
            width: 1000px;
            margin: 10px auto 0 auto;
        }
        .logo{
            width: 10%;
        }
        .logo img{
            width: 100%;
        }
        nav ul li{
            display: inline-block;
            /* ek line me lane keliye */
        }
        nav ul li a {
            color: white;
            font-family:helvetica, Segoe UI, Arial, sans-serif;
            font-size: 14px;
            padding: 14px 8px;
            /* a tag pe padding lagani hai to sathme display block */
            display: block;
        }
        nav ul li a:hover{
            background-color: #298062;
        }
        
        
    </style>
</head>

<body>
    <div class="container">
        <header>
            <!-- container -->
            <div class="logo">
                <a href=""><img src="https://www.cricbuzz.com/_next/static/media/cb_logo.cdbc1556.svg" alt=""></a>
            </div>
            <!-- navigation -->
            <nav>
                <ul>
                    <li><a href="">Live Scores</a></li>
                    <li><a href="">Schedule</a></li>
                    <li><a href="">Archives</a></li>
                    <li><a href="">News</a></li>
                    <li><a href="">Series</a></li>
                    <li><a href="">Team</a></li>
                    <li><a href="">Videos</a></li>
                    <li><a href="">Ranking</a></li>
                    <li><a href="">More</a></li>
                </ul>
            </nav>
        </header>
    </div>

</body>

</html>
