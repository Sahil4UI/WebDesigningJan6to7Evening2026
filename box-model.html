<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            border: 10px solid red;
            border: 10px dotted red;
            border: 10px dashed red;
            border: 10px double red;
            border: 10px inset red;
            border: 10px outset red;
            border: 10px ridge red;
            border: 10px groove red;
            border-left-color: green;
            border-right-color: yellow;
            border-top-color: black ;
            border-radius: 20px 0px 0px 20px;
            background-color: aqua;
            /* content and border */
            padding: 20px;
            padding: 20px 140px;
            /* top-bottom left-right */
            padding: 10px 20px 30px 40px;
            /* top right bottom left */

            /* margin -outside border */
            margin: 50px;
            /* filter: blur(10px); */
            box-shadow: 10px 10px 10px gray;
        }
        p:hover{
            /* filter: blur(0); */
            filter: grayscale();
        }

        h1{
            text-shadow: 2px 2px 5px red;
        }
        
    </style>
</head>
<body>
    <h1>MOVE CURSOR TO SHOW</h1>
    <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Repellat, est. Ducimus laudantium repudiandae harum amet nostrum facere qui, consequuntur, error, in provident magnam soluta nemo accusantium molestias quo voluptatibus corrupti.
    </p>
</body>
</html>
